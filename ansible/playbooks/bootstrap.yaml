---
- name: Bootstrap Fedora workstation
  hosts: workstations
  gather_facts: true
  gather_subset:
    - "!all"
    - "!min"
    - distribution
    - env
    - user_id
  pre_tasks:
    - name: Verify Fedora
      ansible.builtin.assert:
        that:
          - ansible_facts['distribution'] == "Fedora"
          - ansible_facts['distribution_major_version'] | int >= fedora_version_min
        fail_msg: >-
          This playbook targets Fedora >= {{ fedora_version_min }}.
          Got {{ ansible_facts['distribution'] }} {{ ansible_facts['distribution_major_version'] }}.
  roles:
    - role: hostname
      tags: [hostname]
    - role: dnf-tuning
      tags: [dnf, dnf-tuning]
    - role: rpm-fusion
      tags: [dnf, rpm-fusion]
    - role: base-packages
      tags: [packages, base]
    - role: nvidia
      tags: [packages, nvidia]
    - role: multimedia
      tags: [packages, multimedia]
    - role: libvirt
      tags: [packages, libvirt, virtualization]
    - role: hyprland
      tags: [packages, hyprland, desktop]
    - role: greetd
      tags: [greetd, desktop]
    - role: gnome-minimize
      tags: [packages, gnome-minimize, debloat]
    - role: podman
      tags: [packages, podman]
    - role: ssh-agent
      tags: [ssh-agent, systemd]
    - role: tui-tools
      tags: [packages, tui-tools]
    - role: firmware
      tags: [firmware]
    - role: tailscale
      tags: [tailscale, network]
    - role: warp
      tags: [warp, network]
    - role: unityhub
      tags: [packages, unityhub, desktop]
    - role: system-tweaks
      tags: [tweaks]
    - role: dotfiles
      tags: [dotfiles]
    - role: secrets-bootstrap
      tags: [secrets]
    - role: ssh-server
      tags: [ssh, network]
    - role: maintenance
      tags: [maintenance, systemd]
