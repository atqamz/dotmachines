---
- name: Bootstrap Fedora workstation
  hosts: workstations
  gather_facts: true
  pre_tasks:
    - name: Verify Fedora
      ansible.builtin.assert:
        that:
          - ansible_distribution == "Fedora"
          - ansible_distribution_major_version | int >= fedora_version_min
        fail_msg: >-
          This playbook targets Fedora >= {{ fedora_version_min }}.
          Got {{ ansible_distribution }} {{ ansible_distribution_major_version }}.
  roles:
    - role: hostname
      tags: [hostname]
    - role: dnf-tuning
      tags: [dnf, dnf-tuning]
    - role: rpm-fusion
      tags: [dnf, rpm-fusion]
    - role: base-packages
      tags: [packages, base]
    - role: nvidia
      tags: [packages, nvidia]
    - role: multimedia
      tags: [packages, multimedia]
    - role: libvirt
      tags: [packages, libvirt, virtualization]
    - role: hyprland
      tags: [packages, hyprland, desktop]
    - role: gnome-minimize
      tags: [packages, gnome-minimize, debloat]
    - role: firmware
      tags: [firmware]
    - role: tailscale
      tags: [tailscale, network]
    - role: warp
      tags: [warp, network]
    - role: system-tweaks
      tags: [tweaks]
    - role: dotfiles
      tags: [dotfiles]
    - role: secrets-bootstrap
      tags: [secrets]
    - role: ssh-server
      tags: [ssh, network]
