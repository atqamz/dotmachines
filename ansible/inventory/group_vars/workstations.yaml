---
fedora_version_min: 43

dotfiles_repo: "https://github.com/atqamz/dotfiles.git"
dotfiles_path: "{{ ansible_facts['env']['HOME'] }}/dotfiles"

hyprland_copr: "lionheartp/Hyprland"
quickshell_copr: "errornointernet/quickshell"

# sops is not packaged in Fedora; pull the upstream static binary.
sops_version: "3.13.1"
sops_sha256: "620a9d7e3352ababeca6908cea24a6e8b14ce89a448ddbd3f94f1ef3398f470a"

base_packages:
  groups:
    - "@core"
    - "@hardware-support"
    - "@fonts"
    - "@legacy-fonts"
    # @audio dropped: Fedora ships it as "Audio Production" (pulls ardour9,
    # audacity, Carla, musescore, guitarix, hydrogen, rosegarden, qjackctl,
    # jack-mixer, fluidsynth, etc.). Pipewire stack is explicit below.
  wifi:
    - linux-firmware
    - iw
    - iwlwifi-mvm-firmware
    - iwlwifi-dvm-firmware
    - NetworkManager-wifi
  audio:
    - pipewire
    - pipewire-alsa
    - pipewire-pulseaudio
    - wireplumber
    - pavucontrol
    - alsa-sof-firmware
    - alsa-plugins-pulseaudio
    - alsa-utils
  bluetooth:
    - bluez
    - bluez-tools
    - bluez-libs
    - blueman
  printing:
    - cups
    - system-config-printer
  monitoring:
    - upower
    - pciutils
    - usbutils
    - lm_sensors
    - earlyoom
  input_media:
    - brightnessctl
    - playerctl
  filesystem:
    - gvfs
    - udisks2
    - ntfs-3g
  fonts:
    - fontawesome-fonts-all
    - jetbrains-mono-fonts
  cli:
    - git
    - git-lfs
    - htop
    - btop
    - nvtop
    - 7zip
    - fastfetch
    - wl-clipboard
    - grim
    - slurp
    - cliphist
    - wtype
    - alacritty
    - openssh-askpass
    - opentofu
    - tigervnc

hyprland_packages:
  - hyprland
  - hyprland-guiutils
  - hyprlock
  - hypridle
  - hyprpolkitagent
  - quickshell
  - qt6-qtdeclarative
  - qt6-qt5compat
  - qt6-qtsvg
  - qt6-qtwayland
  - qt6-qtimageformats
  - material-icons-fonts
  - ddcutil
  - fish
  - swappy
  - pinentry-gnome3
