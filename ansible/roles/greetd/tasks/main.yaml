---
- name: Install greetd + tuigreet
  become: true
  ansible.builtin.dnf:
    name:
      - greetd
      - tuigreet
    state: present
  notify:
    - Reload systemd
    - Reset greetd failure state
    - Restart greetd

- name: Deploy greetd config
  become: true
  ansible.builtin.copy:
    src: config.toml
    dest: /etc/greetd/config.toml
    owner: root
    group: root
    mode: '0644'
  notify:
    - Reset greetd failure state
    - Restart greetd

- name: Set graphical.target as default
  become: true
  ansible.builtin.file:
    src: /usr/lib/systemd/system/graphical.target
    dest: /etc/systemd/system/default.target
    state: link
    force: true

# gdm package stays installed: gnome-shell hard-requires gdm-libs, and the
# GNOME session is kept as a fallback. We only neutralise the daemon by
# masking gdm.service and pointing display-manager.service at greetd.
- name: Mask gdm.service to prevent it grabbing display-manager
  become: true
  ansible.builtin.systemd:
    name: gdm.service
    enabled: false
    masked: true
  failed_when: false

- name: Point display-manager.service alias at greetd
  become: true
  ansible.builtin.file:
    src: /usr/lib/systemd/system/greetd.service
    dest: /etc/systemd/system/display-manager.service
    state: link
    force: true
  notify:
    - Reload systemd

- name: Enable greetd.service
  become: true
  ansible.builtin.systemd:
    name: greetd.service
    enabled: true
