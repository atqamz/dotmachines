---
- name: Import Cloudflare WARP GPG signing key
  become: true
  ansible.builtin.rpm_key:
    state: present
    key: https://pkg.cloudflareclient.com/pubkey.gpg

- name: Write cloudflare-warp dnf repo (with excludepkgs to hold pinned version)
  become: true
  ansible.builtin.copy:
    dest: /etc/yum.repos.d/cloudflare-warp.repo
    mode: '0644'
    content: |
      [cloudflare-warp-stable]
      name=cloudflare-warp-stable
      baseurl=https://pkg.cloudflareclient.com/rpm
      enabled=1
      type=rpm
      gpgcheck=1
      gpgkey=https://pkg.cloudflareclient.com/pubkey.gpg
      excludepkgs=cloudflare-warp

- name: Install pinned cloudflare-warp from upstream RPM URL
  become: true
  ansible.builtin.dnf:
    name: "{{ warp_rpm_url }}"
    state: present
    disable_excludes: cloudflare-warp-stable
    allow_downgrade: true

- name: Check WARP registration status
  ansible.builtin.command: warp-cli registration show
  register: warp_registration
  changed_when: false
  failed_when: false

- name: Register WARP client (non-interactive, accepts TOS)
  ansible.builtin.command: warp-cli --accept-tos registration new
  when: warp_registration.rc != 0
  register: warp_register
  changed_when: warp_register.rc == 0

- name: Notice — WARP installed but not auto-connected
  ansible.builtin.debug:
    msg: |
      WARP installed (pinned {{ warp_version }}) and registered. Connect manually with:
        warp-cli connect
