---
- name: Import Tailscale GPG signing key
  become: true
  ansible.builtin.rpm_key:
    state: present
    key: https://pkgs.tailscale.com/stable/fedora/repo.gpg

- name: Add Tailscale dnf repo
  become: true
  ansible.builtin.get_url:
    url: https://pkgs.tailscale.com/stable/fedora/tailscale.repo
    dest: /etc/yum.repos.d/tailscale.repo
    mode: '0644'

- name: Install tailscale
  become: true
  ansible.builtin.dnf:
    name: tailscale
    state: present

- name: Enable + start tailscaled
  become: true
  ansible.builtin.systemd:
    name: tailscaled
    enabled: true
    state: started

- name: Check current Tailscale state
  become: true
  ansible.builtin.command: tailscale status --json
  register: tailscale_state
  changed_when: false
  failed_when: false

- name: Bring Tailscale up with auth key (one-off)
  become: true
  ansible.builtin.command: >-
    tailscale up
    --auth-key={{ tailscale_auth_key }}
    {{ tailscale_up_extra_args }}
  when:
    - tailscale_auth_key | length > 0
    - (tailscale_state.stdout is search('NeedsLogin')) or (tailscale_state.stdout is search('NoState'))
  no_log: true   # auth key is sensitive
  register: tailscale_up
  changed_when: tailscale_up.rc == 0

- name: Notice when manual login required
  ansible.builtin.debug:
    msg: |
      Tailscale daemon enabled but no auth key supplied.
      Run `sudo tailscale up` to authenticate via browser.
  when: tailscale_auth_key | length == 0
