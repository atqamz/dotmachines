---
gnome_remove:
  # Welcome tour + offline help
  tour_docs:
    - gnome-tour
    - gnome-user-docs
    - gnome-getting-started-docs
    - yelp
  # Widget apps
  widgets:
    - gnome-calendar
    - gnome-weather
    - gnome-clocks
    - gnome-maps
    - gnome-contacts
  # Audio + video players
  media:
    - totem
    - rhythmbox
    - gnome-music
  # Peripheral apps
  peripherals:
    - cheese
    - simple-scan
    - mediawriter
  # Office suite + dependents
  office_patterns:
    - libreoffice
    - "libreoffice-*"
    - unoconv
  # Crash reporting + hw mce
  # Note: malcontent kept — gnome-control-center hard-requires it
  system_bloat:
    - abrt
    - abrt-cli
    - abrt-desktop
    - abrt-tui
    - abrt-addon-ccpp
    - abrt-addon-kerneloops
    - abrt-addon-pstoreoops
    - abrt-addon-vmcore
    - abrt-addon-xorg
    - abrt-dbus
    - abrt-plugin-bodhi
    - python3-abrt
    - python3-abrt-addon
    - mcelog
    - gnome-software
  # Flatpak + flathub remote
  # Note: flatpak-libs kept — pulled in transitively by malcontent-ui-libs (gnome-control-center dep)
  flatpak:
    - flatpak
    - fedora-flathub-remote
    - flatpak-selinux

# Lean replacements installed after removal pass
gnome_install:
  - nano                # CLI notepad (usually already in @core)
  - snapshot            # camera app (GNOME's new Cheese successor)
