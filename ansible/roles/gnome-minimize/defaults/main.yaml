---
gnome_remove:
  # Welcome tour + offline help
  tour_docs:
    - gnome-tour
    - gnome-user-docs
    - gnome-getting-started-docs
    - yelp
  # Widget apps
  widgets:
    - gnome-calendar
    - gnome-weather
    - gnome-clocks
    - gnome-maps
    - gnome-contacts
  # Audio + video players
  media:
    - totem
    - rhythmbox
    - gnome-music
  # Peripheral apps
  peripherals:
    - cheese
    - simple-scan
    - mediawriter
  # Office suite + dependents
  office_patterns:
    - libreoffice
    - "libreoffice-*"
    - unoconv
  # Crash reporting + hw mce
  # Note: malcontent kept — gnome-control-center hard-requires it
  system_bloat:
    - abrt
    - abrt-cli
    - abrt-desktop
    - abrt-tui
    - abrt-addon-ccpp
    - abrt-addon-kerneloops
    - abrt-addon-pstoreoops
    - abrt-addon-vmcore
    - abrt-addon-xorg
    - abrt-dbus
    - abrt-plugin-bodhi
    - python3-abrt
    - python3-abrt-addon
    - mcelog
    - gnome-software
  # Flatpak + flathub remote
  # Note: flatpak-libs kept — pulled in transitively by malcontent-ui-libs (gnome-control-center dep)
  flatpak:
    - flatpak
    - fedora-flathub-remote
    - flatpak-selinux
  # Audio Production cruft. Previously pulled in by @audio group on Fedora;
  # group is now dropped from base-packages, this purges any existing installs.
  audio_prod:
    - ardour9
    - audacity
    - Carla
    - lv2-carla
    - musescore
    - musescore-data
    - musescore-soundfont
    - musescoreicon-fonts
    - guitarix
    - hydrogen
    - rosegarden4
    - qjackctl
    - lsp-plugins-jack
    - jack-mixer
    - a2jmidid
    - alsamixergui
    - ams
    - Add64
    - drumkv1
    - dssi
    - ffado
    - fluid-soundfont-gm
    - fluidsynth
    - vmpk                  # MIDI keyboard GUI, depends on fluid-soundfont-gm
    - frescobaldi
    - calf
    - arpage
  # GNOME apps unused on a Hyprland-first workstation.
  # Conservative cut: keeps gnome-shell + gnome-control-center for fallback session.
  gnome_apps:
    - gnome-boxes
    - gnome-connections
    - gnome-remote-desktop
    - gnome-text-editor
    - gnome-calculator
    - gnome-classic-session
    - "gnome-shell-extension-*"
    - evolution
    - "evolution-*"

# Lean replacements installed after removal pass
gnome_install:
  - nano                # CLI notepad (usually already in @core)
  - snapshot            # camera app (GNOME's new Cheese successor)
