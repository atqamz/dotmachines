---
- name: Install openssh-server + firewalld
  become: true
  ansible.builtin.dnf:
    name:
      - openssh-server
      - firewalld
      - python3-firewall
    state: present

- name: Enable + start firewalld
  become: true
  ansible.builtin.systemd:
    name: firewalld
    enabled: true
    state: started

- name: Enable + start sshd
  become: true
  ansible.builtin.systemd:
    name: sshd
    enabled: true
    state: started

- name: Open SSH service in firewalld (permanent + runtime)
  become: true
  ansible.posix.firewalld:
    service: ssh
    permanent: true
    immediate: true
    state: enabled
    zone: "{{ ssh_firewalld_zone }}"

- name: Drop key-only sshd config (disable password + keyboard-interactive auth)
  become: true
  ansible.builtin.copy:
    dest: /etc/ssh/sshd_config.d/10-key-only.conf
    mode: '0644'
    content: |
      # Managed by dotmachines/ansible/roles/ssh-server
      PasswordAuthentication no
      KbdInteractiveAuthentication no
      PermitRootLogin prohibit-password
  notify: Restart sshd
