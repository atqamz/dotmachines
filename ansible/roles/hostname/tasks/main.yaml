---
- name: Set static hostname
  become: true
  ansible.builtin.hostname:
    name: "{{ inventory_hostname }}"
    use: systemd

- name: Ensure 127.0.1.1 entry in /etc/hosts
  become: true
  ansible.builtin.lineinfile:
    path: /etc/hosts
    regexp: '^127\.0\.1\.1\s'
    line: "127.0.1.1\t{{ inventory_hostname }}"
    state: present
