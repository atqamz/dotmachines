---
# Path to the cloned `secrets` private repo. Override via:
#   ansible-playbook ... -e secrets_path=~/repo/secrets
secrets_path: "{{ ansible_facts['env']['HOME'] }}/repo/secrets"

ssh_dir: "{{ ansible_facts['env']['HOME'] }}/.ssh"

ssh_files:
  - src: "{{ secrets_path }}/ssh/id_ed25519.sops.key"
    dest: "{{ ssh_dir }}/id_ed25519"
    mode: '0600'
  - src: "{{ secrets_path }}/ssh/id_ed25519.sops.pub"
    dest: "{{ ssh_dir }}/id_ed25519.pub"
    mode: '0644'
  - src: "{{ secrets_path }}/ssh/known_hosts.sops.txt"
    dest: "{{ ssh_dir }}/known_hosts"
    mode: '0644'
  - src: "{{ secrets_path }}/ssh/config.sops.txt"
    dest: "{{ ssh_dir }}/config"
    mode: '0600'
  - src: "{{ secrets_path }}/ssh/authorized_keys.sops.txt"
    dest: "{{ ssh_dir }}/authorized_keys"
    mode: '0600'
  - src: "{{ secrets_path }}/ssh/github_actions_bakso_ed25519.sops.key"
    dest: "{{ ssh_dir }}/github_actions_bakso_ed25519"
    mode: '0600'
  - src: "{{ secrets_path }}/ssh/github_actions_bakso_ed25519.sops.pub"
    dest: "{{ ssh_dir }}/github_actions_bakso_ed25519.pub"
    mode: '0644'

gpg_secondary_keys:
  - blankon
  - password-store
  - deploy-yes2games
  - deploy-hagegames
