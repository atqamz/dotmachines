---
- name: Install libvirt + qemu/kvm + virt tools
  become: true
  ansible.builtin.dnf:
    name:
      - libvirt
      - libvirt-client
      - qemu-kvm
      - virt-install
      - virt-manager
      - edk2-ovmf       # UEFI firmware for VMs
      - swtpm           # software TPM 2.0 (Windows 11 VMs)
      - swtpm-tools
    state: present

- name: Enable + start libvirtd socket
  become: true
  ansible.builtin.systemd:
    name: libvirtd.socket
    enabled: true
    state: started

- name: Add user to libvirt group
  become: true
  ansible.builtin.user:
    name: "{{ ansible_user_id }}"
    groups: libvirt
    append: true

- name: Notice — re-login required for libvirt group to apply
  ansible.builtin.debug:
    msg: |
      User {{ ansible_user_id }} added to libvirt group.
      Log out and back in (or reboot) for group membership to take effect.
      Then run `virsh list` to confirm non-root access works.
